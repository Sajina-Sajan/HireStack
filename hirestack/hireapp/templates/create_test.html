<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Mock Test | HireStack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="text-slate-200 bg-slate-950 flex items-center justify-center min-h-screen p-6">

    <div class="glass-card rounded-[2.5rem] p-10 shadow-2xl w-full max-w-lg">
        <h2 class="text-3xl font-extrabold mb-2 text-white">Create Mock Test</h2>
        <p class="text-slate-400 mb-8 text-sm">You are creating a mock test for the position: <strong class="text-blue-400">{{ job.job_title }}</strong>.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-6">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Test Title (e.g. Python Developer Assessment)</label>
                <input type="text" name="title" required
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
            </div>

            <div class="flex items-center gap-4 mt-8">
                <a href="{% url 'emprofile' %}" class="flex-1 text-center py-3 rounded-xl border border-white/10 hover:bg-white/5 transition-all font-bold text-sm text-slate-300">
                    Cancel
                </a>
                <button type="submit" class="flex-1 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-bold text-sm shadow-lg shadow-blue-500/20 transition-all">
                    Continue to Questions
                </button>
            </div>
        </form>
    </div>

</body>
</html>
