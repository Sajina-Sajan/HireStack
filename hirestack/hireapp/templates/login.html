<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JobPortal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-900 rounded-2xl shadow-2xl p-10 border border-slate-800">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-white tracking-tight">Login</h1>
            <p class="text-slate-400 mt-2">Enter your details to access your account</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">Email</label>
                <input type="email" name="email" placeholder="Enter your email" 
                       class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:bg-slate-800 outline-none transition-all" 
                       required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">Password</label>
                <input type="password" name="password" placeholder="Enter your password" 
                       class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:bg-slate-800 outline-none transition-all" 
                       required>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-500 active:scale-[0.98] transition-all shadow-lg shadow-blue-900/20 mt-4">
                Login
            </button>

            <div class="text-center mt-6">
                <a href="#" class="text-sm text-slate-500 hover:text-blue-400 transition-colors">Forgot your password?</a>
            </div>

        </form>
    </div>

</body>
</html>
