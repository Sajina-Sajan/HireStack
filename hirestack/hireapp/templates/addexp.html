<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Experience | Professional Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-2xl w-full bg-[#1e293b] rounded-3xl shadow-2xl border border-slate-700/50 overflow-hidden">
        <div class="p-8 border-b border-slate-700/50 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold text-white">Add Work Experience</h1>
                <p class="text-slate-400 text-sm mt-1">Share your professional journey and accomplishments.</p>
            </div>
            <div class="w-12 h-12 bg-blue-500/10 text-blue-400 rounded-xl flex items-center justify-center border border-blue-500/20">
                <i class="fas fa-briefcase text-xl"></i>
            </div>
        </div>

       <form method="POST" action="{% url 'addexp' %}" class="p-8 space-y-6">
    {% csrf_token %}
    

    <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Job Title</label>
        <input type="text" name="job_title"
               placeholder="e.g. Senior Software Engineer"
               class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3">
    </div>

  
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Company Name</label>
            <input type="text" name="company_name"
                   placeholder="e.g. Google"
                   class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Location</label>
            <input type="text" name="location"
                   placeholder="e.g. Remote / New York"
                   class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3">
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Start Date</label>
            <input type="date" name="start_date"
                   class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">End Date</label>
            <input type="date" name="end_date"
                   class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3">

            <div class="mt-2 flex items-center">
                <input type="checkbox" name="is_current"
                       class="w-4 h-4 rounded border-slate-700 bg-[#0f172a]">
                <label class="ml-2 text-xs text-slate-400">
                    I currently work here
                </label>
            </div>
        </div>
    </div>


    <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">
            Description / Key Achievements
        </label>
        <textarea name="description" rows="4"
                  class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3"
                  placeholder="Describe your responsibilities and impact..."></textarea>
    </div>


    <div class="flex justify-end gap-4 pt-4">
        <button type="submit"
                class="px-8 py-2.5 bg-blue-600 text-white rounded-xl font-bold">
            Save Experience
        </button>
    </div>
</form>

    </div>

</body>
</html>
