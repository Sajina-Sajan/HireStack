<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Our Job Portal | Register</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gray-950 font-sans text-gray-200">

<div class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-5xl w-full bg-gray-900 rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row border border-gray-800">

        <div class="hidden md:flex md:w-1/2 relative p-12 text-white flex-col justify-center overflow-hidden">
            <img src="https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80" 
                 alt="Office Background" 
                 class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-blue-700/80 mix-blend-multiply"></div>
            
            <div class="relative z-10">
                <h2 class="text-4xl font-bold mb-6">Start Your Journey.</h2>
                <p class="text-blue-100 text-lg mb-8">
                    Join thousands of professionals finding their dream careers or hiring top-tier talent.
                </p>
                <ul class="space-y-4">
                    <li class="flex items-center">
                        <i class="fas fa-check-circle mr-3 text-blue-300"></i> Quick 1-click apply
                    </li>
                    <li class="flex items-center">
                        <i class="fas fa-check-circle mr-3 text-blue-300"></i> Verified employer profiles
                    </li>
                    <li class="flex items-center">
                        <i class="fas fa-check-circle mr-3 text-blue-300"></i> Personalized job alerts
                    </li>
                </ul>
            </div>
        </div>

        <div class="w-full md:w-1/2 p-8 md:p-12 max-h-[90vh] overflow-y-auto">
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-white">Create Account</h1>
                <p class="text-gray-400">
                    Already have an account?
                    <a href="#" class="text-blue-400 font-semibold hover:underline">Log in</a>
                </p>
            </div>

            <form method="post" enctype="multipart/form-data" class="space-y-5">
                {% csrf_token %}

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300">Full Name</label>
                        <input type="text" name="full_name" placeholder="Name" 
                               class="w-full mt-1 p-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
                    </div>
                    <div>
    <label class="block text-sm font-medium text-gray-300">Job Role</label>
    <select name="role"
            class="w-full mt-1 p-3 bg-gray-800 border border-gray-700 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
        <option value="">Select Job Role</option>
        <option value="junior_dev">Junior Developer</option>
        <option value="mid_dev">Mid-Level Developer</option>
        <option value="senior_dev">Senior Developer</option>
        <option value="lead_dev">Lead Developer</option>
        <option value="architect">Architect / Principal Developer</option>
    </select>
</div>

                    <div>
                        <label class="block text-sm font-medium text-gray-300">Phone Number</label>
                        <input type="tel" name="phone_number" placeholder="+1 234 567 890" 
                               class="w-full mt-1 p-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300">Email Address</label>
                    <input type="email" name="email" placeholder="Enter your email" 
                           class="w-full mt-1 p-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300">Password</label>
                    <input type="password" name="password" placeholder="••••••••" 
                           class="w-full mt-1 p-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300">Location</label>
                    <input type="text" name="location" placeholder="City, Country" 
                           class="w-full mt-1 p-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div class="border-t border-gray-800 pt-5 mt-5">
                    <h3 class="text-sm font-bold text-blue-400 uppercase tracking-wider mb-4">Academic Details</h3>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-300">College Name</label>
                        <input type="text" name="college_name" placeholder="University Name" 
                               class="w-full mt-1 p-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-300">Degree</label>
                            <input type="text" name="degree" placeholder="B.Tech, MBA, etc." 
                                   class="w-full mt-1 p-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300">Year of Study</label>
                            <input type="text" name="year_of_study" placeholder="2020 - 2024" 
                                   class="w-full mt-1 p-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300">About Me</label>
                    <textarea name="about_me" rows="3" placeholder="Tell us about yourself" 
                              class="w-full mt-1 p-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300">Skills</label>
                    <input type="text" name="skills" placeholder="Python, Django, HTML..." 
                           class="w-full mt-1 p-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300">Upload Resume (PDF)</label>
                    <input type="file" name="resume" accept=".pdf" 
                           class="w-full mt-1 p-2 bg-gray-800 border border-gray-700 rounded-lg text-gray-400 file:mr-4 file:py-1 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 focus:outline-none">
                </div>

                <button type="submit" 
                        class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-500 transition duration-300 shadow-lg mt-4">
                    Create Account
                </button>

            </form>
        </div>
    </div>
</div>

</body>
</html>
